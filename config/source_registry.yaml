project:
  name: caep-textiles-retrieval
  dataset_version: "paper-corpus-v1"

upstream_repository:
  url: "https://github.com/hsancheza90-art/uni-cc-base-multimodal-textiles-andinos.git"

sources:
  met:
    museum: "The Metropolitan Museum of Art"
    branch: "mejora/met-flujo-reproducible-es"
    commit: "a5f32a929d7c895c4b151e162f734746c226abc4"
    upstream_file: "data/metadata/met_corpus_principal_v2_revisado.csv"
    local_file: "data/source/met/met_corpus_principal_v2_revisado.csv"
    expected_reviewed_primary_count: 127

  cma:
    museum: "Cleveland Museum of Art"
    branch: "mejora/cma-flujo-reproducible-es"
    commit: "0659cd14769fa8e2cf1bde4b01b2cbb3f0415db6"
    upstream_file: "data/metadata/cma_corpus_principal_revisado.csv"
    local_file: "data/source/cma/cma_corpus_principal_revisado.csv"
    expected_reviewed_primary_count: 88

policies:
  preserve_original_files: true
  pin_source_commits: true
  download_images_reproducibly: true
  exclude_images_from_git: true
  never_overwrite_source_files: true